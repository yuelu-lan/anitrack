services:
  mysql:
    image: mysql:8.0
    container_name: anitrack-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - anitrack-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anitrack-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma

  rag-service:
    build: ./rag-service
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      INTERNAL_TOKEN: ${RAG_INTERNAL_TOKEN:-change-me-internal-token}
      CHROMA_URL: http://chroma:8000
      COLLECTION_NAME: anime_wiki
      LLM_BASE_URL: https://api.siliconflow.cn/v1
      LLM_API_KEY: ${SILICONFLOW_API_KEY}
      LLM_MODEL: Qwen/Qwen2.5-7B-Instruct
      EMBEDDING_BASE_URL: https://api.siliconflow.cn/v1
      EMBEDDING_API_KEY: ${SILICONFLOW_API_KEY}
      EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
      TOP_K: 4
    depends_on:
      - chroma

volumes:
  anitrack-mysql-data:
  chroma-data:
